<!DOCTYPE html>
<html>
<head>
<title>Student Marks System</title>
<link rel="stylesheet" href="Assessment1.css">
</head>

<body>

<div class="container">

<h2>Student Marks System</h2>

<input type="text" id="name" placeholder="Student Name"><br>
<input type="text" id="roll" placeholder="Roll Number"><br>
<input type="number" id="math" placeholder="Math Marks"><br>
<input type="number" id="science" placeholder="Science Marks"><br>
<input type="number" id="english" placeholder="English Marks"><br>

<button onclick="addStudent()">Add Student</button>
<br><br>
<button onclick="showStudents()">Display All Students</button>
<button onclick="showAverage()">Show Average</button>
<button onclick="highMarks()">Above 80 Average</button>
<button onclick="failedStudents()">Failed Students</button>
<button onclick="countStudents()">Count Students</button>

<div id="output"></div>

</div>

<script src="Assessment1.js"></script>

</body>
</html>
